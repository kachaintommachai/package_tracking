<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3e;
    --accent: #f97316;
    --accent2: #fb923c;
    --text: #f0f0f5;
    --muted: #6b6b8a;
    --success: #22c55e;
    --warning: #eab308;
    --info: #3b82f6;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(249,115,22,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(249,115,22,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(249,115,22,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* Header */
  header {
    padding: 48px 0 40px;
    text-align: center;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #f97316, #fbbf24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
  }

  .tagline {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Carrier grid */
  .carriers-label {
    text-align: center;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .carriers-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 40px;
  }

  .carrier-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
    font-family: 'Sarabun', sans-serif;
    color: var(--muted);
    position: relative;
    overflow: hidden;
  }

  .carrier-chip::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--c1), var(--c2));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .carrier-chip:hover::before,
  .carrier-chip.active::before {
    opacity: 0.15;
  }

  .carrier-chip.active {
    border-color: var(--accent);
    color: var(--text);
  }

  .carrier-chip span { position: relative; z-index: 1; }
  .carrier-icon { font-size: 18px; position: relative; z-index: 1; }

  /* Search box */
  .search-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }

  .search-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), #fbbf24, transparent);
  }

  .search-row {
    display: flex;
    gap: 12px;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  .input-wrap input {
    width: 100%;
    padding: 14px 20px 14px 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.5px;
  }

  .input-wrap input::placeholder { color: var(--muted); }
  .input-wrap input:focus { border-color: var(--accent); }

  .input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    color: var(--muted);
  }

  .btn-track {
    padding: 14px 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .btn-track:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(249,115,22,0.35);
  }

  .btn-track:active { transform: translateY(0); }
  .btn-track:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .hint {
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  /* Result */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: slideUp 0.4s ease;
    margin-bottom: 16px;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 20px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .result-carrier {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .carrier-badge {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .result-tracking {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .result-name {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  .status-badge {
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
  }

  .status-delivered { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
  .status-transit   { background: rgba(59,130,246,0.15); color: var(--info);    border: 1px solid rgba(59,130,246,0.3); }
  .status-pending   { background: rgba(234,179,8,0.15);  color: var(--warning); border: 1px solid rgba(234,179,8,0.3); }
  .status-error     { background: rgba(239,68,68,0.15);  color: #ef4444;        border: 1px solid rgba(239,68,68,0.3); }

  /* Timeline */
  .timeline { padding: 24px; }

  .timeline-item {
    display: flex;
    gap: 16px;
    position: relative;
    padding-bottom: 24px;
  }

  .timeline-item:last-child { padding-bottom: 0; }

  .timeline-item::before {
    content: '';
    position: absolute;
    left: 15px;
    top: 28px;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }

  .timeline-item:last-child::before { display: none; }

  .dot-wrap {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    position: relative;
    z-index: 1;
  }

  .dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .dot-active  { background: rgba(249,115,22,0.2); border: 2px solid var(--accent); }
  .dot-done    { background: rgba(34,197,94,0.15); border: 2px solid var(--success); }
  .dot-pending { background: var(--surface); border: 2px solid var(--border); }

  .timeline-content { flex: 1; }

  .tl-desc {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--text);
  }

  .tl-location {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .tl-time {
    font-size: 12px;
    color: var(--muted);
    opacity: 0.7;
  }

  /* External link */
  .external-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px;
    margin: 0 24px 24px;
    border: 1px dashed var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-size: 13px;
    text-decoration: none;
    transition: all 0.2s;
    cursor: pointer;
    background: none;
    width: calc(100% - 48px);
    font-family: 'Sarabun', sans-serif;
  }

  .external-link:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 48px;
    color: var(--muted);
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-box {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .error-icon { font-size: 48px; margin-bottom: 16px; }

  /* Carrier quick links */
  .quick-links {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-top: 8px;
  }

  .quick-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    text-decoration: none;
    color: var(--muted);
    font-size: 13px;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .quick-card:hover {
    border-color: var(--accent);
    color: var(--text);
    transform: translateY(-2px);
  }

  .quick-card-icon { font-size: 28px; }
  .quick-card-name { font-weight: 600; font-size: 14px; }

  .section-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* Multi carrier buttons */
  .multi-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    text-align: left;
  }
  .multi-btn:hover {
    border-color: var(--cc, var(--accent));
    background: color-mix(in srgb, var(--cc, var(--accent)) 8%, var(--surface));
    transform: translateX(4px);
  }
  .multi-name { flex: 1; font-weight: 600; }
  .multi-arrow { color: var(--muted); font-size: 16px; }

  /* Responsive */
  @media (max-width: 600px) {
    .logo { font-size: 48px; }
    .search-row { flex-direction: column; }
    .result-header { flex-direction: column; align-items: flex-start; }
    .quick-links { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">TrackIT</div>
    <div class="tagline">ระบบตรวจสอบพัสดุ · ทุกขนส่งในที่เดียว</div>

  <!-- Search -->

      <button class="btn-track" onclick="trackPackage()" id="trackBtn">ตรวจสอบ</button>
    </div>
    <div class="hint">รองรับ Kerry, Flash, J&T, Thailand Post, Shopee Express, Lazada, DHL, SCG Yamato</div>
  </div>

  <!-- Result area -->
  <div id="resultArea"></div>

  <!-- Quick links -->
  <div class="section-title">ลิงก์ตรวจสอบโดยตรง</div>
  <div class="quick-links" id="quickLinks"></div>
</div>

function detectCarrier(trackingNo) {
  const n = trackingNo.trim().toUpperCase();

  // ไปรษณีย์ไทย: EF123456789TH, RH123456789TH ฯลฯ
  if (/^[A-Z]{2}\d{9}TH$/.test(n)) return 'thaipost';

  // Shopee Express — เช็คก่อน Kerry เพราะบาง pattern ขึ้นต้น TH เหมือนกัน
  if (/^SPXTH\d+$/.test(n)) return 'shopee';
  if (/^SPX\d+$/.test(n)) return 'shopee';
  if (/^SHOP\d+$/.test(n)) return 'shopee';
  if (/^TH\d{18,22}$/.test(n)) return 'shopee';
  if (/^SH\d{15,20}$/.test(n)) return 'shopee';

  // Kerry: KEXTH..., TH + 12 หลัก
  if (/^KEX\d+$/.test(n) || /^KEXTH\d+$/.test(n)) return 'kerry';
  if (/^TH\d{12}$/.test(n)) return 'kerry';

  // Flash Express: 62...(18 หลัก), TF...
  if (/^62\d{16}$/.test(n)) return 'flash';
  if (/^TF\d+$/.test(n)) return 'flash';

  // J&T Express: JT..., 600...
  if (/^JT\d+$/.test(n)) return 'jt';
  if (/^600\d{15}$/.test(n)) return 'jt';

  // DHL: 1Z..., JD...
  if (/^1Z[A-Z0-9]{16}$/.test(n)) return 'dhl';
  if (/^JD\d{18}$/.test(n)) return 'dhl';

  return null;
}

function getStatusClass(events) {
  if (!events || events.length === 0) return 'status-error';
  const first = events[0];
  if (first.type === 'done' && first.icon === '🏠') return 'status-delivered';
  if (first.type === 'active') return 'status-transit';
  return 'status-pending';
}

function getStatusLabel(events) {
  if (!events || events.length === 0) return 'ไม่พบข้อมูล';
  const first = events[0];
  if (first.type === 'done' && first.icon === '🏠') return 'จัดส่งสำเร็จ ✓';
  if (first.type === 'active') return 'กำลังจัดส่ง';
  return 'รอดำเนินการ';
}

let selectedCarrier = 'auto';

// Build carrier chips
const grid = document.getElementById('carriersGrid');
CARRIERS.forEach(c => {
  const chip = document.createElement('button');
  chip.className = 'carrier-chip' + (c.id === 'auto' ? ' active' : '');
  chip.style.setProperty('--c1', c.color);
  chip.style.setProperty('--c2', c.color2);
  chip.innerHTML = `<span class="carrier-icon">${c.icon}</span><span>${c.name}</span>`;
  chip.onclick = () => {
    document.querySelectorAll('.carrier-chip').forEach(el => el.classList.remove('active'));
    chip.classList.add('active');
    selectedCarrier = c.id;
  };
  grid.appendChild(chip);
});

// Build quick links
const quickLinks = document.getElementById('quickLinks');
CARRIERS.filter(c => c.id !== 'auto').forEach(c => {
  const a = document.createElement('a');
  a.className = 'quick-card';
  a.href = c.url;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  a.innerHTML = `<span class="quick-card-icon">${c.icon}</span><span class="quick-card-name">${c.name}</span><span style="font-size:11px;opacity:.6">เว็บไซต์หลัก ↗</span>`;
  quickLinks.appendChild(a);
});

function trackPackage() {
  const input = document.getElementById('trackingInput').value.trim();
  if (!input) {
    alert('กรุณากรอกเลขพัสดุ');
    return;
  }

  let carrierId = selectedCarrier !== 'auto' ? selectedCarrier : detectCarrier(input);
  const carrier = carrierId ? CARRIERS.find(c => c.id === carrierId) : null;
  const resultArea = document.getElementById('resultArea');

  if (!carrier || !carrier.trackUrl) {
    const allLinks = CARRIERS.filter(c => c.id !== 'auto').map(c => `
      <button class="multi-btn" onclick="window.open('${c.trackUrl(input)}','_blank')" style="--cc:${c.color}">
        <span style="font-size:20px">${c.icon}</span>
        <span class="multi-name">${c.name}</span>
        <span class="multi-arrow">↗</span>
      </button>
    `).join('');

    resultArea.innerHTML = `
      <div class="result-card">
        <div class="result-header">
          <div class="result-carrier">
            <div class="carrier-badge" style="background:#f9731622;font-size:22px;">🔍</div>
            <div>
              <div class="result-tracking">${input.toUpperCase()}</div>
              <div class="result-name">ไม่สามารถระบุขนส่งได้อัตโนมัติ — เลือกเจ้าที่ต้องการ</div>
            </div>
          </div>
        </div>
        <div style="padding:20px 24px 24px;display:flex;flex-direction:column;gap:10px">
          ${allLinks}
        </div>
      </div>`;
    return;
  }

  const trackUrl = carrier.trackUrl(input);

  resultArea.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-carrier">
          <div class="carrier-badge" style="background:${carrier.color}22;font-size:22px;">${carrier.icon}</div>
          <div>
            <div class="result-tracking">${input.toUpperCase()}</div>
            <div class="result-name">${carrier.name}</div>
          </div>
        </div>
        <div class="status-badge status-transit">กำลังเปิดเว็บไซต์...</div>
      </div>
      <div style="padding:24px;text-align:center;color:var(--muted)">
        <div style="font-size:40px;margin-bottom:12px">🚀</div>
        <div style="font-size:15px;color:var(--text);margin-bottom:6px">กำลังพาไปยังเว็บไซต์ <strong>${carrier.name}</strong></div>
        <div style="font-size:13px;margin-bottom:20px">หากหน้าต่างไม่เปิดอัตโนมัติ กดปุ่มด้านล่าง</div>
        <button class="btn-track" onclick="window.open('${trackUrl}','_blank')">
          เปิด ${carrier.name} ↗
        </button>
      </div>
    </div>`;

  window.open(trackUrl, '_blank');
}

// Allow pressing Enter
document.getElementById('trackingInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') trackPackage();
});
